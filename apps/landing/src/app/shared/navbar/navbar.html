<header
  class="sticky top-0 z-40 transition-all duration-300"
  [class]="scrolled() ? 'border-b border-line bg-white/90 shadow-soft backdrop-blur' : 'border-b border-transparent bg-white/70 backdrop-blur'"
>
  <nav class="container-px flex h-16 items-center justify-between">
    <a routerLink="/" class="flex items-center gap-2.5">
      <img src="/carcanmadcarlan/logo/stalltrack-seal-logo.png" alt="StallTrack seal" class="h-10 w-10 rounded-full object-contain" />
      <span class="font-display text-xl font-bold text-navy">
        Stall<span class="text-gold">Track</span>
      </span>
    </a>

    <div class="hidden items-center gap-7 md:flex">
      @for (l of links; track l.href) {
        <a [href]="l.href" (click)="onDesktopLinkClick(l, $event)" class="text-sm font-medium text-navy/70 transition hover:text-navy">
          {{ l.label }}
        </a>
      }
      <button type="button" (click)="requestDemo.emit()" class="btn-navy py-2.5">Explore StallTrack</button>
    </div>

    <button
      class="grid h-10 w-10 place-items-center rounded-lg border border-line md:hidden"
      (click)="toggle()"
      aria-label="Toggle menu"
    >
      <svg viewBox="0 0 24 24" class="h-5 w-5 stroke-navy" fill="none" stroke-width="2" stroke-linecap="round">
        @if (open()) {
          <path d="M18 6 6 18M6 6l12 12" />
        } @else {
          <path d="M4 7h16M4 12h16M4 17h16" />
        }
      </svg>
    </button>
  </nav>

  @if (open()) {
    <div class="border-t border-line bg-white md:hidden">
      <div class="container-px flex flex-col py-3">
        @for (l of links; track l.href) {
          <a
            [href]="l.href"
            (click)="onMobileLinkClick(l, $event)"
            class="py-2.5 text-sm font-medium text-navy/80"
          >
            {{ l.label }}
          </a>
        }
        <button type="button" (click)="onMobileCta()" class="btn-navy mt-2">Explore StallTrack</button>
      </div>
    </div>
  }
</header>
