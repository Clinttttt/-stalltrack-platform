<div class="relative text-sm font-semibold text-navy">
  <span id="facility-type-label">Facility type</span>
  <input type="hidden" name="facility_type" [value]="selected()" />
  <button
    #trigger
    type="button"
    aria-labelledby="facility-type-label"
    aria-haspopup="listbox"
    [attr.aria-expanded]="isOpen()"
    aria-controls="facility-type-menu"
    (click)="toggle()"
    class="mt-2 flex w-full items-center justify-between rounded-xl border bg-white px-3.5 py-3 text-left font-normal outline-none transition focus:ring-2 focus:ring-gold/20"
    [class]="isOpen() ? 'border-gold ring-2 ring-gold/20' : 'border-line hover:border-gold/60'"
  >
    <span [class]="selected() ? 'text-navy' : 'text-muted'">{{ selected() || 'Select a facility type' }}</span>
    <svg viewBox="0 0 24 24" class="h-5 w-5 shrink-0 transition" [class]="isOpen() ? 'rotate-180' : ''" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m6 9 6 6 6-6" />
    </svg>
  </button>

  @if (isOpen() && menuPosition()) {
    <div
      id="facility-type-menu"
      role="listbox"
      aria-labelledby="facility-type-label"
      [style]="menuPosition()"
      class="facility-picker-menu fixed z-[70] overflow-y-auto rounded-xl border border-line bg-white pb-4 pt-1.5 shadow-card"
    >
      @for (facility of facilityTypes; track facility.value) {
        <button
          type="button"
          role="option"
          [attr.aria-selected]="selected() === facility.value"
          (click)="choose(facility.value)"
          class="w-full px-3.5 py-2 text-left transition hover:bg-mist"
          [class]="selected() === facility.value ? 'bg-green-bg' : ''"
        >
          <span class="block text-sm font-semibold text-navy">{{ facility.value }}</span>
          <span class="mt-0.5 block text-xs font-normal text-muted">{{ facility.description }}</span>
        </button>
      }
    </div>
  }
</div>
