<div class="flex min-h-screen flex-col">
  <app-navbar (requestDemo)="openDemo()" />

  <main class="flex-1">
    <div class="bg-mist py-16 sm:py-24">
      <div class="container-px max-w-2xl text-center">
        <div class="rounded-3xl border border-line bg-white p-10 shadow-card sm:p-14">
          <span class="eyebrow text-green">Inquiry received</span>
          <h1 class="mt-3 font-display text-4xl font-bold text-navy sm:text-5xl">Thank you for reaching out.</h1>
          <p class="mx-auto mt-5 max-w-xl leading-relaxed text-navy/70">
            Your inquiry has been sent to the StallTrack team. We will review your details and follow up using the email address you provided.
          </p>
          <a routerLink="/" class="btn-navy mt-8">Return to StallTrack</a>
        </div>
      </div>
    </div>
  </main>

  <app-footer />

  <button
    (click)="scrollToTop()"
    aria-label="Back to top"
    class="fixed bottom-6 right-6 z-50 grid h-11 w-11 place-items-center rounded-full bg-navy text-white shadow-card transition-all duration-300 hover:bg-navy-600"
    [class]="showBackToTop() ? 'translate-y-0 opacity-100' : 'pointer-events-none translate-y-3 opacity-0'"
  >
    <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m18 15-6-6-6 6" />
    </svg>
  </button>

  @if (demoModalOpen()) {
    <app-demo-request-modal (close)="closeDemo()" />
  }
</div>
